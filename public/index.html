<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hawaiʻi ʻOhana Reunion 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FBF7EF; --paper:#FFFDF8; --ink:#23201B; --ink-soft:#6F665A; --ink-faint:#9A9183;
    --line:#E8DFCD; --line-soft:#F0E9DC; --brass:#A6854C; --brass-deep:#856A3B;
    --ocean:#2E6A64; --blush:#C98C7E;
    --serif:'Cormorant Garamond',Georgia,serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--ivory);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:540px;margin:0 auto;min-height:100vh;padding-bottom:84px;}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass-deep);font-weight:600;}
  .serif{font-family:var(--serif);}
  /* header */
  header{padding:30px 24px 20px;border-bottom:1px solid var(--line);background:var(--paper);}
  header .eyebrow{margin-bottom:8px;}
  header h1{font-family:var(--serif);font-weight:600;font-size:34px;line-height:1.05;letter-spacing:.01em;}
  header .sub{font-size:12.5px;color:var(--ink-soft);margin-top:8px;letter-spacing:.04em;}
  .rule{height:1px;background:var(--line);border:0;}
  /* screens */
  .screen{display:none;padding:24px;}
  .screen.active{display:block;}
  .sec-label{display:flex;align-items:center;gap:12px;margin:26px 0 14px;}
  .sec-label:first-child{margin-top:6px;}
  .sec-label .ln{flex:1;height:1px;background:var(--line);}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:18px 20px;margin-bottom:14px;}
  /* home hero */
  .count{text-align:center;padding:30px 0 22px;}
  .count .n{font-family:var(--serif);font-weight:600;font-size:72px;line-height:.9;color:var(--ink);}
  .count .l{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);margin-top:12px;}
  .islands{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .isle{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:18px;}
  .isle .nm{font-family:var(--serif);font-size:24px;font-weight:600;}
  .isle .pl{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
  .isle .dt{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--brass-deep);margin-top:10px;}
  .stats{display:flex;border:1px solid var(--line);border-radius:5px;background:var(--paper);margin:14px 0;}
  .stats div{flex:1;text-align:center;padding:18px 0;}
  .stats div+div{border-left:1px solid var(--line);}
  .stats .n{font-family:var(--serif);font-size:32px;font-weight:600;line-height:1;}
  .stats .l{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);margin-top:7px;}
  /* rows */
  .row{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--line-soft);}
  .row:last-child{border-bottom:0;}
  .row .t{font-size:14.5px;font-weight:500;}
  .row .s{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .row .r{font-size:12px;color:var(--ink-soft);text-align:right;white-space:nowrap;}
  .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .tag::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
  .tag.ok{color:var(--ocean);} .tag.todo{color:var(--brass-deep);}
  /* flights timeline */
  .leg{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--line-soft);}
  .leg:last-child{border-bottom:0;}
  .leg .mk{width:9px;height:9px;border:1.5px solid var(--brass);border-radius:50%;margin-top:5px;flex:none;}
  .leg .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);}
  .leg .rt{font-family:var(--serif);font-size:20px;font-weight:600;margin:3px 0 2px;}
  .leg .meta{font-size:12.5px;color:var(--ink-soft);}
  /* days accordion */
  .day{border:1px solid var(--line);border-radius:5px;background:var(--paper);margin-bottom:12px;overflow:hidden;}
  .day>summary{list-style:none;cursor:pointer;padding:16px 18px;display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .day>summary::-webkit-details-marker{display:none;}
  .day .dn{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);}
  .day .dt{font-family:var(--serif);font-size:21px;font-weight:600;margin-top:3px;}
  .day .chev{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .day[open] .chev{color:var(--brass-deep);}
  .day .body{padding:0 18px 8px;}
  .it{display:flex;gap:14px;padding:12px 0;border-top:1px solid var(--line-soft);}
  .it .tm{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass-deep);min-width:74px;padding-top:2px;}
  .it .ac{font-size:14.5px;font-weight:500;}
  .it .no{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.5;}
  a.tel,a.lnk{color:var(--ocean);text-decoration:none;border-bottom:1px solid rgba(46,106,100,.3);font-weight:500;}
  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;max-width:540px;margin:0 auto;background:var(--paper);border-top:1px solid var(--line);display:flex;padding:7px 0 9px;}
  nav button{flex:1;background:none;border:0;cursor:pointer;color:var(--ink-faint);display:flex;flex-direction:column;align-items:center;gap:5px;font-family:var(--sans);}
  nav button svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.4;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  nav button span{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;}
  nav button.active{color:var(--brass-deep);}
  .empty{color:var(--ink-faint);font-size:13px;padding:10px 0;font-style:italic;}
  /* gate */
  #gate{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;}
  #gate .mk{width:46px;height:1px;background:var(--brass);margin:0 auto 22px;}
  #gate .eyebrow{margin-bottom:14px;}
  #gate h1{font-family:var(--serif);font-weight:600;font-size:44px;line-height:1.02;}
  #gate p{font-size:13.5px;color:var(--ink-soft);margin:14px 0 30px;letter-spacing:.03em;}
  #gate .field{width:100%;max-width:300px;}
  #gate input{width:100%;border:0;border-bottom:1px solid var(--line);background:transparent;padding:12px 4px;font-size:16px;font-family:var(--sans);color:var(--ink);text-align:center;letter-spacing:.04em;outline:none;}
  #gate input:focus{border-bottom-color:var(--brass);}
  #gate button{width:100%;max-width:300px;margin-top:24px;padding:15px;border:0;background:var(--ink);color:var(--ivory);font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;cursor:pointer;border-radius:3px;}
  #gate .err{color:var(--blush);font-size:12.5px;min-height:18px;margin-top:14px;letter-spacing:.03em;}
  #gate .foot{margin-top:34px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);}
</style>
</head>
<body>

<div id="gate">
  <div class="mk"></div>
  <div class="eyebrow">An ʻOhana Reunion</div>
  <h1 class="serif">Hawaiʻi 2026</h1>
  <p>Please enter the family passcode</p>
  <div class="field"><input id="pin" type="password" inputmode="text" placeholder="Passcode" autocomplete="off" /></div>
  <div class="err" id="gateErr"></div>
  <button id="enterBtn">Enter</button>
  <div class="foot">Oʻahu &nbsp;·&nbsp; Maui</div>
</div>

<div class="wrap" id="app" style="display:none">
  <header>
    <div class="eyebrow" id="hDates">July 26 – August 7, 2026</div>
    <h1 class="serif">Hawaiʻi ʻOhana Reunion</h1>
    <div class="sub">The Royal Hawaiian &nbsp;·&nbsp; Grand Wailea</div>
  </header>

  <section class="screen active" id="s-home"></section>
  <section class="screen" id="s-flights"></section>
  <section class="screen" id="s-stays"></section>
  <section class="screen" id="s-days"></section>
  <section class="screen" id="s-info"></section>

  <nav>
    <button data-s="home" class="active"><svg viewBox="0 0 24 24"><path d="M3 13l9-8 9 8"/><path d="M5 11v8h14v-8"/></svg><span>Home</span></button>
    <button data-s="flights"><svg viewBox="0 0 24 24"><path d="M2 14l20-7-7 20-3-8-10-5z"/></svg><span>Flights</span></button>
    <button data-s="stays"><svg viewBox="0 0 24 24"><path d="M3 18v-7a2 2 0 012-2h14a2 2 0 012 2v7"/><path d="M3 18h18"/><path d="M7 9V7a2 2 0 012-2h6a2 2 0 012 2v2"/></svg><span>Stays</span></button>
    <button data-s="days"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="1.5"/><path d="M4 9h16M8 3v4M16 3v4"/></svg><span>Days</span></button>
    <button data-s="info"><svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-3 2a12 12 0 006 6l2-3 5 2v4a2 2 0 01-2 2A17 17 0 013 6a2 2 0 012-2z"/></svg><span>Info</span></button>
  </nav>
</div>

<script>
const $=s=>document.querySelector(s);
const stripEmoji=s=>String(s==null?'':s).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{1F1E6}-\u{1F1FF}]/gu,'').replace(/\s{2,}/g,' ').trim();
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const clean=s=>esc(stripEmoji(s));
const isOk=s=>/confirm|✅/i.test(s||''); const isTodo=s=>/book|to do|☐|tbd/i.test(s||'');

async function boot(){
  const r=await fetch('/api/data');
  if(r.status===401){ $('#gate').style.display='flex'; $('#app').style.display='none'; return; }
  const data=await r.json();
  $('#gate').style.display='none'; $('#app').style.display='block';
  render(data);
}
$('#enterBtn').onclick=login; $('#pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){
  $('#gateErr').textContent='';
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:$('#pin').value})});
  if(r.ok) boot(); else $('#gateErr').textContent=(await r.json()).error||'Please try again';
}
function label(txt){return `<div class="sec-label"><div class="eyebrow">${esc(txt)}</div><div class="ln"></div></div>`;}

function render(d){
  renderHome(d); renderFlights(d.flights||[]); renderStays(d.lodging||[]);
  renderDays(d.schedule||[]); renderInfo(d.contacts_links||[]);
}

function renderHome(d){
  const ms=new Date('2026-07-26T00:00:00')-new Date(); const days=Math.max(0,Math.ceil(ms/86400000));
  const resv=d.reservations||[];
  const resHtml=resv.map(r=>{
    const st=r.Status||''; const cls=isOk(st)?'ok':'todo'; const lbl=isOk(st)?'Confirmed':'To book';
    return `<div class="row"><div><div class="t">${clean(r.Item)}</div><div class="s">${clean(r.Date)}${r.Time?' &middot; '+clean(r.Time):''}</div></div><div class="r"><span class="tag ${cls}">${lbl}</span></div></div>`;
  }).join('')||'<div class="empty">No reservations listed.</div>';
  $('#s-home').innerHTML=`
    <div class="count"><div class="n">${days}</div><div class="l">Days until Hawaiʻi</div></div>
    <div class="islands">
      <div class="isle"><div class="nm">Oʻahu</div><div class="pl">The Royal Hawaiian</div><div class="dt">Jul 26 – 31</div></div>
      <div class="isle"><div class="nm">Maui</div><div class="pl">Grand Wailea</div><div class="dt">Jul 31 – Aug 6</div></div>
    </div>
    <div class="stats"><div><div class="n">16</div><div class="l">Guests</div></div><div><div class="n">7</div><div class="l">Keiki</div></div><div><div class="n">12</div><div class="l">Days</div></div></div>
    ${label('Reservations')}<div class="card">${resHtml}</div>`;
}

function renderFlights(f){
  const html=f.map(l=>`<div class="leg"><div class="mk"></div><div style="flex:1">
    <div class="lbl">${clean(l.Leg)}${l.Status?' &middot; '+clean(l.Status):''}</div>
    <div class="rt">${clean(l.Depart)} <span style="color:var(--ink-faint)">to</span> ${clean(l.Arrive)}</div>
    <div class="meta">${clean(l.Date)}${l['Flight #']?' &middot; '+clean(l['Flight #']):''}</div>
    ${l.Notes?`<div class="meta" style="margin-top:4px">${clean(l.Notes)}</div>`:''}</div></div>`).join('')||'<div class="empty">No flights listed.</div>';
  $('#s-flights').innerHTML=label('Itinerary in the Air')+`<div class="card">${html}</div>`;
}

function renderStays(rooms){
  const byProp={}; rooms.forEach(r=>{(byProp[r.Property]=byProp[r.Property]||[]).push(r);});
  let html='';
  for(const p in byProp){
    html+=label(p)+`<div class="card">`+byProp[p].map(r=>`
      <div class="row"><div><div class="t">${clean(r['Room / Villa'])}</div>
      <div class="s">${clean(r.Occupants)}${r.Family&&r.Family!=='—'?' &middot; '+clean(r.Family):''}</div></div>
      <div class="r"><div class="eyebrow" style="color:var(--ink-faint)">Conf</div>${clean(r['Confirmation #'])}</div></div>`).join('')+`</div>`;
  }
  $('#s-stays').innerHTML=html||'<div class="empty">No lodging listed.</div>';
}

function renderDays(sch){
  const days=[]; const idx={};
  sch.forEach(r=>{ const key=r.Day||r.Date; if(!key) return; if(!idx[key]){idx[key]={day:r.Day,date:r.Date,theme:r.Theme,items:[]}; days.push(idx[key]);}
    if(r.Time||r.Activity) idx[key].items.push(r); });
  const html=days.map((dd,i)=>`<details class="day" ${i===0?'open':''}>
    <summary><div><div class="dn">${clean(dd.day)} &middot; ${clean(dd.date)}</div><div class="dt">${clean(dd.theme)}</div></div><span class="chev">View</span></summary>
    <div class="body">${dd.items.map(it=>`<div class="it"><div class="tm">${clean(it.Time)}</div><div style="flex:1"><div class="ac">${clean(it.Activity)}</div>${it.Notes?`<div class="no">${clean(it.Notes)}</div>`:''}</div></div>`).join('')}</div>
  </details>`).join('')||'<div class="empty">No schedule listed.</div>';
  $('#s-days').innerHTML=label('Day by Day')+html;
}

function renderInfo(c){
  const byType={}; c.forEach(r=>{(byType[r.Type]=byType[r.Type]||[]).push(r);});
  let html='';
  for(const t in byType){
    html+=label(t)+`<div class="card">`+byType[t].map(r=>{
      const phone=(r.Phone||'').replace(/[^0-9+]/g,'');
      const url=r['Address / URL']||'';
      const isLink=/\.[a-z]{2,}/i.test(url)&&!/\s/.test(url)&&!/\d{3,}\s/.test(url);
      const right=phone&&phone.length>=7?`<a class="tel" href="tel:${esc(phone)}">${clean(r.Phone)}</a>`:'';
      return `<div class="row"><div><div class="t">${clean(r.Name)}</div>
        <div class="s">${isLink?`<a class="lnk" href="https://${esc(url.replace(/^https?:\/\//,''))}" target="_blank" rel="noopener">${clean(url)}</a>`:clean(url)}${r.Notes?' &middot; '+clean(r.Notes):''}</div></div>
        <div class="r">${right}</div></div>`;
    }).join('')+`</div>`;
  }
  $('#s-info').innerHTML=html||'<div class="empty">No contacts listed.</div>';
}

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); $('#s-'+b.dataset.s).classList.add('active');
  window.scrollTo(0,0);
});

boot();
</script>
</body>
</html>
